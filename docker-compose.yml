services:
  nginx:
    container_name: nginx
    build: 
      context: .
      dockerfile: ./nginx/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./nginx/.env
    depends_on:
      - pdf_processor_service
      - frontend

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: frontend
    env_file:
      - ./frontend/.env

  pdf_processor_service:
    build:
      context: .
      dockerfile: ./pdf_processor_service/Dockerfile
    container_name: pdf_processor_service
    env_file:
      - ./pdf_processor_service/.env

  pdf_extraction_service:
    build:
      context: .
      dockerfile: ./pdf_extraction_service/Dockerfile
    container_name: pdf_extraction_service
    env_file:
      - ./pdf_extraction_service/.env
    depends_on:
      - minio
    runtime: nvidia
    environment:
      # Timezone configuration
      - TZ=Asia/Singapore
      # NVIDIA GPU configuration
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  docling_translation_service:
    build:
      context: .
      dockerfile: ./docling_translation_service/Dockerfile
    container_name: docling_translation_service
    env_file:
      - ./docling_translation_service/.env
  
  pdf_renderer_service:
    build:
      context: .
      dockerfile: ./pdf_renderer_service/Dockerfile
    container_name: pdf_renderer_service
    env_file:
      - ./pdf_renderer_service/.env

  redis:
    container_name: redis
    image: redis:8.2.1-alpine
    expose:
      - "6379"

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Admin UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbucket:
    container_name: createbucket
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for MinIO to be ready...';
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 2;
        done;
        echo 'MinIO is healthy, continuing...';
        mc mb -p local/omnifiles;
        mc policy set none local/omnifiles
        exit 0;
      "

volumes:
  minio-data:
