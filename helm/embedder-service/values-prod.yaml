# Production environment configuration for embedder-service
# This file overrides default values.yaml for production deployment

# Production image configuration
image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/embedder_service
  tag: "v1.0.0"
  pullPolicy: Always

# Production resource allocation
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Multiple replicas for production high availability
replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# ChromaDB configuration for production
chromadb:
  host: "chromadb-service"
  port: "8000"
  collection: "production_document_embeddings"

# Production health probes
startupProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 45
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 15
  successThreshold: 1

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2
  successThreshold: 1

# Environment-specific environment variables
env:
  - name: "LOG_LEVEL"
    value: "WARN"
  - name: "ENVIRONMENT"
    value: "production"

# Enable comprehensive monitoring for production
serviceMonitor:
  enabled: true
  interval: "15s"
  scrapeTimeout: "5s"
  labels:
    environment: production
    service: embedder-service

# Enable strict network policies for production security
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    fromSameNamespace: true
    fromIngressController: true
    # Restrict external access in production
    customRules: []
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: true
    allowHTTP: false  # Restrict HTTP in production
    allowChromaDBService: true
    toSameNamespace: true
    # Additional security restrictions
    customRules: []

# Pod disruption budget for production availability
podDisruptionBudget:
  enabled: true
  minAvailable: 2  # Always keep at least 2 pods running

# Conservative rolling update strategy for production
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

# Resource quota for production namespace
securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Node selection for production workloads (if using node pools)
nodeSelector: {}
  # environment: production
  # node-type: compute

# Tolerations for dedicated production nodes
tolerations: []
  # - key: "production"
  #   operator: "Equal"
  #   value: "true"
  #   effect: "NoSchedule"

# Anti-affinity to spread pods across nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - embedder-service
        topologyKey: kubernetes.io/hostname