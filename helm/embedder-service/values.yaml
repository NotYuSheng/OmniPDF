# Prestaging environment configuration for embedder-service
# Prestaging environment configuration for embedder-service in CRC

# Use local CRC registry image
image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/embedder_service
  tag: "dev-v0.0.3-5d69f89"
  pullPolicy: Always

# Prestaging resource allocation - increased memory for ML models
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi

# Single replica for prestaging
replicaCount: 1
autoscaling:
  enabled: false

# ChromaDB configuration for prestaging
chromadb:
  host: "chromadb-service"
  port: "8000"
  collection: "prestaging_document_embeddings"

# Health probes with adjusted timing for prestaging
startupProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 20
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 8
  successThreshold: 1

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2
  successThreshold: 1

# Environment-specific environment variables
env:
  - name: "LOG_LEVEL"
    value: "DEBUG"
  - name: "ENVIRONMENT"
    value: "prestaging"

# Enable basic monitoring for prestaging
serviceMonitor:
  enabled: false  # Enable when Prometheus is available

# Network policy for prestaging security
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    allowedCallers:
      # PDF Processor Service - sends chunking + embedding task
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-processor-service
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: false
    allowHTTP: false
    allowedTargets:
      # ChromaDB - store embeddings
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: chromadb
        ports: [8000]
      # MinIO - future job status storage
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: minio
        ports: [9000]
      # Redis - document file list management
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: redis
        ports: [6379]

# Pod disruption budget not needed for single replica
podDisruptionBudget:
  enabled: false

# Resource quota for prestaging namespace
# Istio sidecar injection for service mesh
podAnnotations:
  sidecar.istio.io/inject: "true"
  sidecar.istio.io/proxyCPU: "15m"
  sidecar.istio.io/proxyMemory: "128Mi"

# Service configuration
service:
  type: ClusterIP
  port: 8000

# ServiceAccount configuration
serviceAccount:
  create: false
  automount: false

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Secrets configuration
secrets:
  create: false
  name: "embedder-service-secrets"
