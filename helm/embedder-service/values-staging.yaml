# Staging environment configuration for embedder-service
# This file overrides default values.yaml for staging deployment

# Staging image configuration - using local CRC registry
image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/embedder_service
  tag: "dev-v0.0.1-860e67e"
  pullPolicy: Always

# Staging resource allocation
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

# Multiple replicas for staging high availability
replicaCount: 2
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ChromaDB configuration for staging
chromadb:
  host: "chromadb-service"
  port: "8000"
  collection: "staging_document_embeddings"

# Production-like health probes for staging
startupProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12
  successThreshold: 1

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2
  successThreshold: 1

# Environment-specific environment variables
env:
  - name: "LOG_LEVEL"
    value: "INFO"
  - name: "ENVIRONMENT"
    value: "staging"

# Enable monitoring for staging
serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

# Enable network policies for staging security
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    # ZERO-TRUST: Only pdf-processor-service can call embedder-service
    allowedCallers:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-processor-service
    # Custom ingress rules for special cases
    customRules: []
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: true
    allowHTTP: true
    # ZERO-TRUST: embedder-service can only call ChromaDB
    allowedTargets:
      # ChromaDB for storing embeddings
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: chromadb
        ports:
          - 8000

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# Rolling update strategy for staging
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

# Resource quota for staging namespace
