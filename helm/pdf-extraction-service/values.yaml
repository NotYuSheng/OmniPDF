# Default values for pdf-extraction-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 2

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/pdf_extraction_service
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

#This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/ 
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  # runAsUser: 65534  # Let OpenShift assign user ID automatically
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8000

# Ingress disabled - external routing via Istio Gateway, internal via service mesh
ingress:
  enabled: false

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6
livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2

#This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  # Writable volume for temporary files (required with read-only filesystem)
  - name: tmp
    emptyDir: {}

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  # Mount writable temporary directory
  - name: tmp
    mountPath: "/tmp"

nodeSelector: {}

tolerations: []

affinity: {}

# LLM Configuration - override in environment-specific values files
llm:
  baseUrl: "http://webworkdgx/vllm_qwen2.5/v1"  # Default for local dev
  model: "qwen2.5-0.5b-instruct"

env: []  # Will be populated from LLM config in deployment template

# Secret configuration for sensitive values
secrets:
  # Must reference existing secret - secret templates removed for security
  create: true
  # Name of the secret to reference (must exist)
  name: pdf-extraction-service-secrets

# Network policy configuration for network segmentation
networkPolicy:
  enabled: false  # Disabled by default for dev/testing
  ingress:
    enabled: true
    # ZERO-TRUST: Only pdf-processor-service can call pdf-extraction-service
    allowedCallers:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-processor-service
    # Custom ingress rules (empty by default)
    customRules: []
  egress:
    enabled: true
    # Allow DNS resolution (required for hostname lookups)
    allowDNS: true
    # Allow HTTPS for external APIs
    allowHTTPS: false  # Models pre-installed in container - no external downloads
    # Allow HTTP for internal services  
    allowHTTP: false
    # ZERO-TRUST: pdf-extraction-service can only call specific services
    allowedTargets:
      # MinIO for storing extracted images, JSON, and job results
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: minio
        ports:
          - 9000
      # Redis for document file list management
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: redis
        ports:
          - 6379
    # Custom egress rules (empty by default)
    customRules: []

# Pod Disruption Budget for high availability during maintenance
podDisruptionBudget:
  enabled: false  # Disabled by default for dev
  # Use either minAvailable OR maxUnavailable (not both)
  minAvailable: null
  maxUnavailable: null

# Deployment strategy for updates (defaults to Kubernetes standard)
deploymentStrategy: {}
  # Example configurations:
  # type: RollingUpdate
  # rollingUpdate:
  #   maxUnavailable: 25%
  #   maxSurge: 25%
  # 
  # OR for faster dev updates:
  # type: Recreate

serviceMonitor:
  enabled: false  # Disabled by default - enable in environments with Prometheus
  # Metrics endpoint configuration
  port: "http"              # Service port name to scrape (default: http)
  path: "/metrics"          # Metrics endpoint path
  interval: "30s"           # How often to scrape metrics
  scrapeTimeout: "10s"      # Timeout for each scrape
  honorLabels: false        # Whether to honor labels from target
  # Additional labels for ServiceMonitor resource
  labels: {}
  # Additional annotations for ServiceMonitor resource  
  annotations: {}
  # Metric relabeling (advanced)
  metricRelabelings: []
  relabelings: []

#istio:
#  enabled: true
