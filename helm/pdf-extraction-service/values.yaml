# Default values for pdf-extraction-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 2

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/notyusheng/pdf-extraction-service
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

#This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/ 
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  # runAsUser: 65534  # Let OpenShift assign user ID automatically
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6
livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2

#This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# LLM Configuration - override in environment-specific values files
llm:
  baseUrl: "http://webworkdgx/vllm_qwen2.5/v1"  # Default for local dev
  model: "qwen2.5-0.5b-instruct"

env: []  # Will be populated from LLM config in deployment template

# Secret configuration for sensitive values
secrets:
  # Set to true to create secret from values, false to use existing secret
  create: false
  # Name of the secret to reference (must exist if create=false)
  name: pdf-extraction-service-secrets
  # Data for secret creation (only used when create=true)
  # Values will be base64 encoded automatically
  data: {}
    # OPENAI_API_KEY: "your-api-key-here"
    # DATABASE_PASSWORD: "your-db-password"

# Network policy configuration for network segmentation
networkPolicy:
  enabled: false  # Disabled by default for dev/testing
  ingress:
    enabled: true
    # Allow ingress controller to reach this service
    fromIngressController: true
    ingressControllerNamespaceLabels:
      name: ingress-nginx
    # Allow services in same namespace to communicate
    fromSameNamespace: true
    # Custom ingress rules (empty by default)
    customRules: []
  egress:
    enabled: true
    # Allow DNS resolution (required for hostname lookups)
    allowDNS: true
    # Allow HTTPS for external APIs
    allowHTTPS: true
    # Allow HTTP for internal services  
    allowHTTP: false
    # Allow communication to LLM service
    allowLLMService: true
    llmServiceSelectors:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: llm-service
    llmServicePorts:
      - 8080
      - 8000
    # Allow traffic to same namespace
    toSameNamespace: true
    # Custom egress rules (empty by default)
    customRules: []

# Pod Disruption Budget for high availability during maintenance
podDisruptionBudget:
  enabled: false  # Disabled by default for dev
  # Use either minAvailable OR maxUnavailable (not both)
  minAvailable: null
  maxUnavailable: null

# Deployment strategy for updates (defaults to Kubernetes standard)
deploymentStrategy: {}
  # Example configurations:
  # type: RollingUpdate
  # rollingUpdate:
  #   maxUnavailable: 25%
  #   maxSurge: 25%
  # 
  # OR for faster dev updates:
  # type: Recreate

serviceMonitor:
  enabled: false  # Disabled by default - enable in environments with Prometheus
  # Metrics endpoint configuration
  port: "http"              # Service port name to scrape (default: http)
  path: "/metrics"          # Metrics endpoint path
  interval: "30s"           # How often to scrape metrics
  scrapeTimeout: "10s"      # Timeout for each scrape
  honorLabels: false        # Whether to honor labels from target
  # Additional labels for ServiceMonitor resource
  labels: {}
  # Additional annotations for ServiceMonitor resource  
  annotations: {}
  # Metric relabeling (advanced)
  metricRelabelings: []
  relabelings: []

#istio:
#  enabled: true
