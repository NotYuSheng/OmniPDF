apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "pdf-renderer-service.fullname" . }}-test-connection"
  labels:
    {{- include "pdf-renderer-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['--spider', '--timeout=10', '{{ include "pdf-renderer-service.fullname" . }}:{{ .Values.service.port }}/health']
  restartPolicy: Never
