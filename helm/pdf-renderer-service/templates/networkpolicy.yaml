{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pdf-renderer-service.fullname" . }}
  labels:
    {{- include "pdf-renderer-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pdf-renderer-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- if .Values.networkPolicy.ingress.enabled }}
    - Ingress
    {{- end }}
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  {{- if .Values.networkPolicy.ingress.enabled }}
  ingress:
    # ZERO-TRUST: Allow traffic from specific allowed callers only
    # Allow traffic from specific allowed callers (zero-trust)
    {{- range .Values.networkPolicy.ingress.allowedCallers }}
    - from:
        - {{ .podSelector | toYaml | nindent 10 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- end }}
    # Custom ingress rules
    {{- with .Values.networkPolicy.ingress.customRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    # Allow DNS resolution
    {{- if .Values.networkPolicy.egress.allowDNS }}
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    # Allow HTTPS for external APIs
    {{- if .Values.networkPolicy.egress.allowHTTPS }}
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    # Allow HTTP for internal services
    {{- if .Values.networkPolicy.egress.allowHTTP }}
    - to: []
      ports:
        - protocol: TCP
          port: 80
    {{- end }}
    # Allow communication to specific target services (zero-trust)
    {{- range .Values.networkPolicy.egress.allowedTargets }}
    - to:
        - {{ .podSelector | toYaml | nindent 10 }}
      ports:
        {{- range .ports }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    # Custom egress rules
    {{- with .Values.networkPolicy.egress.customRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}