# Staging environment overrides
replicaCount: 3

# Staging LLM configuration

# Staging resources (closer to production)
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

# Production-like autoscaling
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Staging secrets
secrets:
  create: false
  name: pdf-renderer-service-staging-secrets

# Production-like image handling
image:
  pullPolicy: Always

# Enable ingress for staging testing
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "staging-issuer"
  hosts:
    - host: pdf-renderer-service-staging.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: pdf-renderer-service-staging-tls
      hosts:
        - pdf-renderer-service-staging.company.com

# Environment variables
env:
  - name: LOG_LEVEL
    value: "WARN"
  - name: ENVIRONMENT
    value: "staging"
  - name: ENABLE_METRICS
    value: "true"
  - name: ENABLE_TRACING
    value: "true"

# Enable network policy for staging security testing
networkPolicy:
  enabled: true

# Pod disruption budget for staging availability (3 replicas, allow 1 down)
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# Conservative deployment strategy for staging (production-like)
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

# Production-like resource quota for staging stress testing
serviceMonitor:
  enabled: true
  interval: "15s"  # More frequent monitoring for staging testing