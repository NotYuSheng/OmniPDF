# Default values for pdf-processor-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 2

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/pdf_processor_service
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "dev-v0.0.3-5d69f89"

# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

#This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/ 
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  # runAsUser: 65534  # Let OpenShift assign user ID automatically
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 8
livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2

#This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

env: []

# Secret configuration for sensitive values
secrets:
  # Must reference existing secret - secret templates removed for security
  create: false
  # Name of the secret to reference (must exist)
  name: pdf-processor-service-secrets

# Network policy configuration for zero-trust network segmentation
networkPolicy:
  enabled: false  # Disabled by default for dev/testing
  ingress:
    enabled: true
    # ZERO-TRUST: Only nginx and frontend can call pdf-processor-service
    allowedCallers:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: nginx
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: frontend
    # Custom ingress rules for special cases
    customRules: []
  egress:
    enabled: true
    # Essential egress for all services
    allowDNS: true
    allowHTTPS: false  # pdf-processor doesn't call external APIs
    # ZERO-TRUST: pdf-processor can call multiple downstream services
    allowedTargets:
      # Chat service for RAG queries
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: chat-service
        ports:
          - 8000
      # PDF extraction service
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-extraction-service
        ports:
          - 8002
      # Embedder service for vectorization
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: embedder-service
        ports:
          - 8005
      # Translation service
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: docling-translation-service
        ports:
          - 8003
      # PDF renderer service
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-renderer-service
        ports:
          - 8004
      # Image captioner service
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: image-captioner-service
        ports:
          - 8006
      # Metadata service
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: metadata-service
        ports:
          - 8007
      # MinIO for file storage
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: minio
        ports:
          - 9000
      # Redis for session management
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: redis
        ports:
          - 6379
    # Custom egress rules for special cases
    customRules: []

# Pod Disruption Budget for high availability during maintenance
podDisruptionBudget:
  enabled: false  # Disabled by default for dev
  # Use either minAvailable OR maxUnavailable (not both)
  minAvailable: null
  maxUnavailable: null

# Deployment strategy for updates (defaults to Kubernetes standard)
deploymentStrategy: {}

# Service monitoring for Prometheus (optional)
serviceMonitor:
  enabled: false  # Disabled by default - enable in environments with Prometheus
