# OmniPDF Shared Staging Values
# Staging-specific overrides for all services (production-like)

# Staging image configuration
image:
  pullPolicy: IfNotPresent

# Production-like resource allocation
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

# Multiple replicas for high availability testing
replicaCount: 2

# Enable autoscaling for staging
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Enable production features in staging
networkPolicy:
  enabled: true

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

serviceMonitor:
  enabled: true
  interval: "30s"

# Staging-specific environment variables
env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENVIRONMENT
    value: "staging"
  - name: ENABLE_METRICS
    value: "true"
  - name: ENABLE_TRACING
    value: "true"

# Conservative deployment strategy for staging
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1