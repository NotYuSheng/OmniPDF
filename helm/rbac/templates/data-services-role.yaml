{{- if .Values.rbac.dataServices.enabled }}
---
# Roles for Data Services (C4: Data Layer)
# Services: ChromaDB, MinIO, Redis
# Note: These are endpoints - no outbound calls to other services

# Shared Role for Data Services - minimal permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: data-services-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: data
rules:
{{- if .Values.rbac.dataServices.canCallServices }}
# Service Discovery - based on values.yaml configuration (currently disabled for data services)
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
{{- else }}
# Self-service discovery only (for health checks, etc.) when service calls are disabled
- apiGroups: [""]
  resources: ["services"]
  resourceNames: 
    - "minio"
    - "chromadb" 
    - "redis"
  verbs: ["get"]
{{- end }}

# Access to own configuration
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames:
    - "minio-config"
    - "chromadb-config"
    - "redis-config"
  verbs: ["get", "watch"]

# Access to own secrets (per-service secret isolation)
- apiGroups: [""]
  resources: ["secrets"] 
  resourceNames:
    - "minio-secrets"
    - "chromadb-secrets"
    - "redis-secrets"
  verbs: ["get"]

---
# RoleBinding for MinIO Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minio-binding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: data
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.minio }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: data-services-role
  apiGroup: rbac.authorization.k8s.io

---
# RoleBinding for ChromaDB Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chromadb-binding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: data
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.chromadb }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: data-services-role
  apiGroup: rbac.authorization.k8s.io

---
# RoleBinding for Redis Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-binding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: data
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.redis }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: data-services-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}