  verbs: ["get", "watch"]

---
# RoleBinding for Docling Translation Service  
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: docling-translation-service-binding
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.doclingTranslate }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: docling-translation-service-role
  apiGroup: rbac.authorization.k8s.io

