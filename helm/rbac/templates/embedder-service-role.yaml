{{- if .Values.rbac.processingServices.enabled }}
---
# Embedder Service Role (C4: Processing Layer)
# Text processing service - chunks documents and creates vector embeddings for storage
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: embedder-service-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: processing
rules:
# Own secrets access
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: 
    - "embedder-service-secrets"
  verbs: ["get"]

{{- if .Values.rbac.processingServices.canAccessDataStores }}
# Data Store Access - based on C4 diagram: "Store embeddings"
- apiGroups: [""]
  resources: ["services"]
  resourceNames: ["chromadb"]
  verbs: ["get", "list"]
{{- end }}

# ConfigMap access
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["embedder-service-config"]
  verbs: ["get", "watch"]

---
# RoleBinding for Embedder Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: embedder-service-binding
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.embedder }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: embedder-service-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}