{{- if .Values.rbac.processingServices.enabled }}
---
# PDF Extraction Service Role (C4: Processing Layer)
# Core extraction service - uses docling to extract tables/images, calls AI for captioning
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: pdf-extraction-service-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: processing
rules:
# Own secrets access
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: 
    - "pdf-extraction-service-secrets"
  verbs: ["get"]

{{- if .Values.rbac.processingServices.canCallAI }}
# AI Services Discovery - based on C4 diagram: "Requests image captioning"
- apiGroups: [""]
  resources: ["services", "endpoints"]
  resourceNames: ["image-captioner-service"]
  verbs: ["get", "list"]
{{- end }}

{{- if .Values.rbac.processingServices.canAccessDataStores }}
# Data Store Access - based on C4 diagram: "Stores extracted images"
- apiGroups: [""]
  resources: ["services", "endpoints"]
  resourceNames: ["minio"]
  verbs: ["get", "list"]
{{- end }}

# ConfigMap access
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["pdf-extraction-service-config"]
  verbs: ["get", "watch"]

---
# RoleBinding for PDF Extraction Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pdf-extraction-service-binding
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.pdfExtraction }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: pdf-extraction-service-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}