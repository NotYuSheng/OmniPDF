{{- if .Values.rbac.processingServices.enabled }}
---
# Individual roles for each processing service (per-service secret isolation)

# PDF Extraction Service Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: pdf-extraction-service-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: processing
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: 
    - "pdf-extraction-service-secrets"  # Contains vLLM, MinIO credentials for this service
  verbs: ["get"]
- apiGroups: [""]
  resources: ["services"]
  resourceNames: ["image-captioner-service", "minio"]
  verbs: ["get", "list"]

---
# RoleBinding for PDF Extraction Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pdf-extraction-service-binding
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.pdfExtraction }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: pdf-extraction-service-role
  apiGroup: rbac.authorization.k8s.io

---
