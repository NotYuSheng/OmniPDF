{{- if .Values.rbac.dataServices.enabled }}
---
# Redis Service Role (C4: Data Layer)
# Session storage and cache endpoint - stores sessions, handles data expiration
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: redis-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: data
rules:
# Redis is a pure endpoint per C4 diagram - no outbound service calls needed

# Access to own configuration
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames:
    - "redis-config"
  verbs: ["get", "watch"]

# Access to own secrets
- apiGroups: [""]
  resources: ["secrets"] 
  resourceNames:
    - "redis-secrets"
  verbs: ["get"]

---
# RoleBinding for Redis Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: redis-binding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: data
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.redis }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: redis-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}