{{- if .Values.rbac.processingServices.enabled }}
---
# Docling Translation Service Role (C4: Processing Layer)
# Pure processing service - receives docling JSON for translation, no outbound calls
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: docling-translation-service-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: processing
rules:
# Own secrets access
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: 
    - "docling-translation-service-secrets"
  verbs: ["get"]

# ConfigMap access
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["docling-translation-service-config"]
  verbs: ["get", "watch"]

---
# RoleBinding for Docling Translation Service  
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: docling-translation-service-binding
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.doclingTranslate }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: docling-translation-service-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}