{{- if .Values.rbac.gateway.enabled }}
---
# Role for Nginx Gateway - Routes requests to frontend and services
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: nginx-gateway-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: gateway
rules:
{{- if .Values.rbac.gateway.canCallFrontendAndProcessor }}
# Service Discovery - can access frontend and pdf-processor based on C4 diagram routing
- apiGroups: [""]
  resources: ["services", "endpoints"]
  resourceNames: 
    - "frontend"                # Routes UI requests
    - "pdf-processor-service"   # Routes API requests
  verbs: ["get", "list"]
{{- end }}

# Secret access for service communication
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames:
    - "nginx-secrets"  # Contains gateway configuration and service credentials
  verbs: ["get"]

# ConfigMap access for nginx configuration  
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames:
    - "nginx-config"
  verbs: ["get", "watch"]

---
# RoleBinding for Nginx Gateway Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-gateway-binding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: gateway
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.nginx }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: nginx-gateway-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}