{{- if .Values.rbac.pdfProcessor.enabled }}
---
# Role for PDF Processor Service - Main Orchestrator (C4: Orchestrator Layer)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: pdf-processor-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: orchestrator
rules:
{{- if .Values.rbac.pdfProcessor.canCallProcessingServices }}
# Processing Services Discovery - based on C4 diagram workflows (restricted access only)
- apiGroups: [""]
  resources: ["services", "endpoints"]
  resourceNames:
    - "pdf-extraction-service"      # Delegates table and image extraction
    - "docling-translation-service" # Requests docling translation
    - "pdf-renderer-service"        # Renders previews of extracted content
    - "embedder-service"            # Sends chunking + embedding tasks
    - "chat-service"                # RAG conversations
    - "metadata-service"            # Requests metadata generation
  verbs: ["get", "list"]
{{- end }}

{{- if .Values.rbac.pdfProcessor.canAccessDataStores }}
# Data Store Services Discovery - based on C4 diagram data flows
- apiGroups: [""]
  resources: ["services", "endpoints"]
  resourceNames:
    - "minio"      # Stores PDFs, generates presigned URLs
    - "chromadb"   # Vector database access
    - "redis"      # Session validation
  verbs: ["get", "list"]
{{- end }}
  
# Secret access for inter-service authentication
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: 
    - "pdf-processor-service-secrets"  # Own secrets
{{- if .Values.rbac.pdfProcessor.canCallProcessingServices }}
    - "pdf-extraction-service-secrets"
    - "docling-translation-service-secrets" 
    - "pdf-renderer-service-secrets"
    - "embedder-service-secrets"
    - "chat-service-secrets"
    - "metadata-service-secrets"
{{- end }}
{{- if .Values.rbac.pdfProcessor.canAccessDataStores }}
    - "minio-secrets"
    - "chromadb-secrets"
    - "redis-secrets"
{{- end }}
  verbs: ["get"]

# ConfigMap access for service configuration
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames:
    - "pdf-processor-service-config"
  verbs: ["get", "watch"]

---
# RoleBinding for PDF Processor Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pdf-processor-binding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: orchestrator
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.pdfProcessor }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: pdf-processor-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}