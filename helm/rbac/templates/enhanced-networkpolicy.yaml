# Enhanced NetworkPolicy Template with Service Account Support
# This can be used as a reference for updating existing NetworkPolicy templates

{{- define "omnipdf.networkPolicy" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .serviceName }}-networkpolicy
  namespace: {{ .namespace }}
  labels:
    app.kubernetes.io/name: {{ .serviceName }}
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .serviceName }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- range .ingressRules }}
    - from:
        # Pod selector (existing approach)
        {{- if .podSelector }}
        - podSelector:
            matchLabels:
              {{- toYaml .podSelector.matchLabels | nindent 14 }}
        {{- end }}
        # Service Account selector (new approach) 
        {{- if .serviceAccount }}
        - podSelector:
            matchLabels:
              # Target pods with specific service account
              # Note: Kubernetes doesn't directly support SA selectors in NetworkPolicy
              # So we rely on service account labels being propagated to pods
              omnipdf.service-account: {{ .serviceAccount }}
        {{- end }}
        # Namespace selector (for cross-namespace if needed)
        {{- if .namespaceSelector }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .namespaceSelector.matchLabels | nindent 14 }}
        {{- end }}
      ports:
        {{- range .ports }}
        - protocol: {{ .protocol | default "TCP" }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
  egress:
    # DNS egress (always needed)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP  
          port: 53
    {{- range .egressRules }}
    - to:
        {{- if .podSelector }}
        - podSelector:
            matchLabels:
              {{- toYaml .podSelector.matchLabels | nindent 14 }}
        {{- end }}
        {{- if .serviceAccount }}
        - podSelector:
            matchLabels:
              omnipdf.service-account: {{ .serviceAccount }}
        {{- end }}
        {{- if .namespaceSelector }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml .namespaceSelector.matchLabels | nindent 14 }}
        {{- end }}
      ports:
        {{- range .ports }}
        - protocol: {{ .protocol | default "TCP" }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
{{- end }}

---
# Example: Chat Service NetworkPolicy with Service Account Support
{{- $chatServicePolicy := dict 
  "serviceName" "chat-service"
  "namespace" .Values.namespace
  "ingressRules" (list
    (dict 
      "serviceAccount" "pdf-processor-service"
      "ports" (list (dict "port" 8000))
    )
  )
  "egressRules" (list
    (dict 
      "serviceAccount" "vllm-text"  
      "ports" (list (dict "port" 8000))
    )
    (dict
      "serviceAccount" "chromadb"
      "ports" (list (dict "port" 8000)) 
    )
  )
}}
{{- include "omnipdf.networkPolicy" $chatServicePolicy }}

---
# Example: PDF Processor NetworkPolicy (Orchestrator)
{{- $pdfProcessorPolicy := dict
  "serviceName" "pdf-processor-service"
  "namespace" .Values.namespace
  "ingressRules" (list
    (dict
      "serviceAccount" "frontend"
      "ports" (list (dict "port" 8000))
    )
    (dict
      "serviceAccount" "istio-gateway"
      "ports" (list (dict "port" 8000))
    )
  )
  "egressRules" (list
    (dict "serviceAccount" "pdf-extraction-service" "ports" (list (dict "port" 8000)))
    (dict "serviceAccount" "docling-translation-service" "ports" (list (dict "port" 8000)))
    (dict "serviceAccount" "pdf-renderer-service" "ports" (list (dict "port" 8000)))
    (dict "serviceAccount" "embedder-service" "ports" (list (dict "port" 8000)))
    (dict "serviceAccount" "chat-service" "ports" (list (dict "port" 8000)))
    (dict "serviceAccount" "metadata-service" "ports" (list (dict "port" 8000)))
    (dict "serviceAccount" "minio" "ports" (list (dict "port" 9000)))
    (dict "serviceAccount" "redis" "ports" (list (dict "port" 6379)))
  )
}}
{{- include "omnipdf.networkPolicy" $pdfProcessorPolicy }}