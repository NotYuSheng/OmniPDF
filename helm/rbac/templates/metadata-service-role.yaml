{{- if .Values.rbac.aiServices.enabled }}
---
# Metadata Service Role (C4: AI/ML Layer)
# AI endpoint - called by PDF processor, accesses data stores for metadata generation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: metadata-service-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: ai-ml
rules:
# Own secrets access
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: 
    - "metadata-service-secrets"  # Contains vLLM credentials
  verbs: ["get"]

{{- if .Values.rbac.aiServices.canAccessDataStores }}
# Data Store Service Discovery - based on C4 diagram metadata generation operations
- apiGroups: [""]
  resources: ["services", "endpoints"]
  resourceNames: 
    - "chromadb"   # Query vectors for metadata generation (mTLS)
    - "minio"      # Store/load metadata results (mTLS)
    - "redis"      # Session validation (mTLS)
  verbs: ["get", "list"]
{{- end }}

# ConfigMap access
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["metadata-service-config"]
  verbs: ["get", "watch"]

# Metadata service accesses data stores for metadata generation and calls external vLLM

---
# RoleBinding for Metadata Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metadata-service-binding
  namespace: {{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.metadataService }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: metadata-service-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}