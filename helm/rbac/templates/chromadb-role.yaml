{{- if .Values.rbac.dataServices.enabled }}
---
# ChromaDB Service Role (C4: Data Layer)
# Vector database endpoint - stores embeddings, serves similarity queries for RAG
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Values.namespace }}
  name: chromadb-role
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: data
rules:
# ChromaDB is a pure endpoint per C4 diagram - no outbound service calls needed

# Access to own configuration
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames:
    - "chromadb-config"
  verbs: ["get", "watch"]

# Access to own secrets
- apiGroups: [""]
  resources: ["secrets"] 
  resourceNames:
    - "chromadb-secrets"
  verbs: ["get"]

---
# RoleBinding for ChromaDB Service
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chromadb-binding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnipdf-rbac
    app.kubernetes.io/component: data
subjects:
- kind: ServiceAccount
  name: {{ .Values.serviceAccounts.chromadb }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: chromadb-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}