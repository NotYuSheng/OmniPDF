# RBAC Configuration for OmniPDF Services
# Based on service communication matrix requirements

nameOverride: ""
fullnameOverride: ""

# Global namespace configuration
namespace: omnipdf

# Service account names (should match Helm release names)
serviceAccounts:
  pdfProcessor: "pdf-processor-service"
  pdfExtraction: "pdf-extraction-service"
  doclingTranslate: "docling-translation-service"
  pdfRenderer: "pdf-renderer-service"
  embedder: "embedder-service"
  chatService: "chat-service"
  imageCaptioner: "image-captioner-service"
  metadataService: "metadata-service"
  cleaner: "cleaner"
  frontend: "frontend"
  nginx: "nginx"
  minio: "minio"
  chromadb: "chromadb"
  redis: "redis"

# Enable/disable specific RBAC rules
rbac:
  # Core orchestration permissions (pdf-processor-service)
  pdfProcessor:
    enabled: true
    # Can call all processing services
    canCallProcessingServices: true
    # Can access all data stores
    canAccessDataStores: true
    
  # Processing service permissions (pdf-extraction, docling-translation, embedder, chat)
  processingServices:
    enabled: true
    # Can call AI/ML services
    canCallAI: true
    # Limited data store access
    canAccessDataStores: true
    
  # AI/ML service permissions (image-captioner, metadata)
  aiServices:
    enabled: true
    # No outbound service calls (end of chain)
    canCallServices: false
    
  # Data services permissions (minio, chromadb, redis)
  dataServices:
    enabled: true
    # No outbound calls needed
    canCallServices: false
    
  # Frontend service permissions
  frontend:
    enabled: true
    # Can only call pdf-processor
    canCallProcessor: true
    
  # Gateway service permissions (nginx)
  gateway:
    enabled: true
    # Can call frontend and pdf-processor
    canCallFrontendAndProcessor: true
    
  # Cleanup service permissions
  cleaner:
    enabled: true
    # Can access all data stores for cleanup
    canAccessAllDataStores: true
    
  # PDF renderer service permissions
  pdfRenderer:
    enabled: true
    # Can access minio for file operations
    canAccessStorage: true