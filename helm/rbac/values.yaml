# OmniPDF RBAC Configuration - Explicit Service-to-Service Permissions
# Redesigned for clarity, auditability, and granular control

nameOverride: ""
fullnameOverride: ""

# Global namespace configuration
namespace: omnipdf

# Service account names (should match Helm release names)
serviceAccounts:
  nginx: "nginx"
  frontend: "frontend"
  pdf-processor-service: "pdf-processor-service"
  pdf-extraction-service: "pdf-extraction-service"
  docling-translation-service: "docling-translation-service"
  pdf-renderer-service: "pdf-renderer-service"
  # Data services
  minio: "minio"
  redis: "redis"

# Explicit service-to-service access matrix
# Each service explicitly declares what it can call/access
rbac:
  
  # API Gateway - Routes external traffic
  nginx:
    enabled: true
    canCall: {}                         # Routes to istio-gateway (different namespace)
    canAccess:
      configmaps: ["nginx-config"]      # Configuration access
      secrets: ["nginx-secrets"]        # TLS certificates, etc.
  
  # Frontend UI - Streamlit application  
  frontend:
    enabled: true
    canCall:
      pdf-processor-service: true       # Direct communication to processor
    canAccess:
      secrets: ["frontend-secrets"]     # UI configuration secrets
  
  # Central orchestrator - Coordinates all processing workflows
  pdf-processor-service:
    enabled: true
    canCall:
      # Processing services
      pdf-extraction-service: true      # Document extraction
      docling-translation-service: true # Translation workflows
      pdf-renderer-service: true        # PDF rendering
    canAccess:
      # Data stores for coordination
      minio: true                       # File storage coordination
      redis: true                       # Session management
      secrets: ["pdf-processor-secrets"] # Service credentials

  # Document processing - Extracts content from PDFs
  pdf-extraction-service:
    enabled: true
    canCall: {}                         # No service calls
    canAccess:
      minio: true                       # Store extracted content
      redis: true                       # Document file lists
      secrets: ["pdf-extraction-secrets"]

  # AI services - Called by other services, no outbound calls to services
  docling-translation-service:
    enabled: true
    canCall: {}                         # External vLLM only (via customRules)
    canAccess:
      minio: true                       # Store translated JSON + job status
      redis: true                       # Document file list management
      secrets: ["docling-translation-secrets"]

  # PDF rendering - Overlays translated content
  pdf-renderer-service:
    enabled: true
    canCall: {}                         # No service calls
    canAccess:
      minio: true                       # Access PDFs for rendering + job status
      redis: true                       # Document file list management
      secrets: ["pdf-renderer-secrets"]

  # Data services - Accept connections, no outbound service calls
  minio:
    enabled: true
    canCall: {}                         # Pure object storage
    canAccess:
      secrets: ["minio-secrets"]        # S3 credentials
      persistentvolumeclaims: ["minio-data"] # Storage persistence

  redis:
    enabled: true
    canCall: {}                         # Pure session store
    canAccess:
      secrets: ["redis-secrets"]        # Redis credentials
      persistentvolumeclaims: ["redis-data"] # Data persistence

# Global RBAC settings
global:
  # Enable RBAC for all services by default
  rbacEnabled: true
  
  # Default resource permissions all services need
  defaultPermissions:
    # Basic pod permissions
    pods: ["get", "list"]
    # Service discovery
    services: ["get", "list"]
    endpoints: ["get", "list"]
    # Istio service mesh
    destinationrules: ["get", "list"]
    virtualservices: ["get", "list"]
  
  # Resource naming conventions
  resourceNaming:
    secretPrefix: ""                    # No prefix, use service name
    configMapPrefix: ""                 # No prefix, use service name  
    rolePrefix: "omnipdf-"              # Prefix for all RBAC roles

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
