# MinIO production environment configuration

# Single replica (can be scaled to distributed mode)
replicaCount: 1

# Use official Redis image with specific stable version
image:
  repository: redis
  tag: "8.2.1-alpine"
  pullPolicy: Always

# Production resources
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi

# Production storage configuration
persistence:
  enabled: true
  storageClass: "fast-ssd"
  accessModes:
    - ReadWriteOnce
  size: 100Gi  # Large storage for production

# MinIO credentials for production (use external secret manager)
secrets:
  create: false  # Use external secret in production
  name: redis-prod-secrets

# Redis environment settings for production
env:
  - name: REDIS_LOG_LEVEL
    value: "warning"  # Less verbose for production

# Enable production ingress
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
  hosts:
    - host: minio.omnipdf.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: minio-prod-tls
      hosts:
        - minio.omnipdf.com

consoleIngress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: minio-console.omnipdf.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: minio-console-prod-tls
      hosts:
        - minio-console.omnipdf.com

# Autoscaling disabled for single-node (enable for distributed mode)
autoscaling:
  enabled: false

# Enable high availability features
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Production monitoring
serviceMonitor:
  enabled: true
  interval: "15s"
  labels:
    environment: production

# Enable network policies for security
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    # ZERO-TRUST: Only specific services can connect to Redis
    allowedCallers:
      # PDF processor orchestrates workflows and manages sessions
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-processor-service
      # PDF extraction manages document file lists
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-extraction-service
      # Metadata service manages document file lists
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: metadata-service
      # Cleaner accesses Redis for cleanup notifications
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: cleaner
    # Custom ingress rules for special cases
    customRules: []
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: false  # Redis is cache/session store, doesn't call external APIs

# Production resource quotas
