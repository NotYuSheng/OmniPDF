# MinIO staging environment configuration

# Single replica for staging (distributed mode can be added later)
replicaCount: 1

# Use official Redis image
image:
  repository: redis
  tag: "8.2.1-alpine"
  pullPolicy: Always

# Staging resources
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Storage configuration for staging
persistence:
  enabled: true
  storageClass: "fast-ssd"  # Use faster storage for staging
  accessModes:
    - ReadWriteOnce
  size: 20Gi

# Redis doesn't require secrets in staging
secrets:
  create: false
  name: redis-staging-secrets

# Redis environment settings for staging
env:
  - name: REDIS_LOG_LEVEL
    value: "notice"

# Enable ingress for staging
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  hosts:
    - host: minio-staging.omnipdf.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: minio-staging-tls
      hosts:
        - minio-staging.omnipdf.local

consoleIngress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: minio-console-staging.omnipdf.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: minio-console-staging-tls
      hosts:
        - minio-console-staging.omnipdf.local

# Autoscaling disabled for single-node
autoscaling:
  enabled: false

# Enable service monitoring
serviceMonitor:
  enabled: true
  interval: "30s"
  labels:
    environment: staging

# Enable network policies for security
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    fromSameNamespace: true
    fromIngressController: true
  egress:
    enabled: true
    allowDNS: true