# Redis prestaging environment configuration

# Single replica for prestaging
replicaCount: 1

# Use official Redis image
image:
  repository: redis
  tag: "8.2.1-alpine"
  pullPolicy: Always

# Reduced resources for prestaging
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 25m
    memory: 32Mi

# Storage configuration for prestaging
persistence:
  enabled: true
  storageClass: ""  # Use default CRC storage
  accessModes:
    - ReadWriteOnce
  size: 500Mi  # Smaller size for prestaging

# Redis password disabled for prestaging simplicity
redis:
  password: ""

# Disable autoscaling for prestaging
autoscaling:
  enabled: false

# Use Recreate strategy for single-node
deploymentStrategy:
  type: Recreate

# Enable Redis metrics exporter for prestaging
metrics:
  enabled: true
  image:
    repository: oliver006/redis_exporter
    tag: "v1.45.0"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 50m
      memory: 32Mi
    requests:
      cpu: 5m
      memory: 8Mi
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65534
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# Enable service monitoring for prestaging
serviceMonitor:
  enabled: true
  port: "metrics"          # Redis exporter port
  path: "/metrics"         # Redis exporter endpoint
  interval: "30s"          # Scrape frequency
  scrapeTimeout: "10s"
  labels:
    environment: prestaging

# Network policy disabled for pre-staging flexibility
networkPolicy:
  enabled: false

# Istio sidecar injection for service mesh
podAnnotations:
  sidecar.istio.io/inject: "true"
  sidecar.istio.io/proxyCPU: "10m"
  sidecar.istio.io/proxyMemory: "128Mi"