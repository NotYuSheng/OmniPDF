# Default values for redis.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: redis
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "8.2.1-alpine"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  # runAsUser: 65534  # Let OpenShift assign user ID automatically
  readOnlyRootFilesystem: false  # Redis needs to write to disk
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 6379

# Redis-specific configuration
redis:
  # Redis configuration options
  config: |
    # Redis configuration file
    # Basic configuration for Docker/Kubernetes deployment
    
    # Network
    bind 0.0.0.0
    port 6379
    
    # General
    timeout 0
    tcp-keepalive 300
    
    # Memory management
    maxmemory-policy allkeys-lru
    
    # Persistence (disabled for session cache use case)
    save ""
    
    # Logging
    loglevel notice
    
    # Authentication (will be set via environment variable if secret exists)
    # requirepass will be set dynamically by init script if REDIS_PASSWORD is available
    
  # Redis password (optional, will be generated if not provided)
  # Leave empty to disable authentication
  password: ""

# Persistence for Redis data
persistence:
  enabled: true
  # storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  annotations: {}

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Health checks
livenessProbe:
  exec:
    command:
      - sh
      - -c
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-cli -a "$REDIS_PASSWORD" ping
        else
          redis-cli ping
        fi
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  exec:
    command:
      - sh
      - -c
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-cli -a "$REDIS_PASSWORD" ping
        else
          redis-cli ping
        fi
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  exec:
    command:
      - sh
      - -c
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-cli -a "$REDIS_PASSWORD" ping
        else
          redis-cli ping
        fi
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Network policy configuration
networkPolicy:
  enabled: false
  ingress:
    enabled: true
    # ZERO-TRUST: Only specific services can connect to Redis
    allowedCallers:
      # PDF processor orchestrates workflows and manages sessions
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-processor-service
      # PDF extraction manages document file lists
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-extraction-service
      # Metadata service manages document file lists
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: metadata-service
      # Cleaner accesses Redis for cleanup notifications
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: cleaner
    # Custom ingress rules for special cases
    customRules: []
  egress:
    enabled: false
    allowDNS: true
    customRules: []

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: null
  maxUnavailable: null

# Deployment strategy
deploymentStrategy: {}

# Service monitoring for Prometheus (optional)
serviceMonitor:
  enabled: false
  port: "redis"
  path: "/metrics"
  interval: "30s"
  scrapeTimeout: "10s"
  honorLabels: false
  labels: {}
  annotations: {}
  metricRelabelings: []
  relabelings: []