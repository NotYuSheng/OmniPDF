{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-service.fullname" . }}
  labels:
    {{- include "chat-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- if .Values.networkPolicy.ingress.enabled }}
    - Ingress
    {{- end }}
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  {{- if .Values.networkPolicy.ingress.enabled }}
  ingress:
    # Allow ingress controller traffic
    {{- if .Values.networkPolicy.ingress.fromIngressController }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- range $key, $value := .Values.networkPolicy.ingress.ingressControllerNamespaceLabels }}
              {{ $key }}: {{ $value | quote }}
              {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
    # Allow traffic from same namespace
    {{- if .Values.networkPolicy.ingress.fromSameNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
    # Allow custom ingress rules
    {{- range .Values.networkPolicy.ingress.customRules }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    # Allow DNS resolution
    {{- if .Values.networkPolicy.egress.allowDNS }}
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    # Allow HTTPS traffic (for external APIs)
    {{- if .Values.networkPolicy.egress.allowHTTPS }}
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    # Allow HTTP traffic (for internal services)
    {{- if .Values.networkPolicy.egress.allowHTTP }}
    - to: []
      ports:
        - protocol: TCP
          port: 80
    {{- end }}
    # Allow traffic to LLM service
    {{- if .Values.networkPolicy.egress.allowLLMService }}
    - to:
        {{- range .Values.networkPolicy.egress.llmServiceSelectors }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
      ports:
        {{- range .Values.networkPolicy.egress.llmServicePorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    # Allow traffic to same namespace
    {{- if .Values.networkPolicy.egress.toSameNamespace }}
    - to:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
    {{- end }}
    # Allow custom egress rules
    {{- range .Values.networkPolicy.egress.customRules }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}