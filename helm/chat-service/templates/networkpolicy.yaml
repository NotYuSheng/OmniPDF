{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-service.fullname" . }}
  labels:
    {{- include "chat-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- if .Values.networkPolicy.ingress.enabled }}
    - Ingress
    {{- end }}
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  {{- if .Values.networkPolicy.ingress.enabled }}
  ingress:
    # ZERO-TRUST: Allow traffic from specific services only
    {{- range .Values.networkPolicy.ingress.allowedCallers }}
    - from:
        - {{ . | toYaml | nindent 10 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- end }}
    # Custom ingress rules
    {{- with .Values.networkPolicy.ingress.customRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    # Essential egress for all services
    {{- if .Values.networkPolicy.egress.allowDNS }}
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- if .Values.networkPolicy.egress.allowHTTPS }}
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    # ZERO-TRUST: Allow communication to specific services only
    {{- range .Values.networkPolicy.egress.allowedTargets }}
    - to:
        - {{ .podSelector | toYaml | nindent 10 }}
      ports:
        {{- range .ports }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    # Custom egress rules
    {{- with .Values.networkPolicy.egress.customRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}