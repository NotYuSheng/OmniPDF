{{- if .Values.sidecarInjection.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- include "istio-gateway.labels" . | nindent 4 }}
    {{- range $key, $value := .Values.sidecarInjection.namespaceLabels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
{{- end }}