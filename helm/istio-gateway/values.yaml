# OmniPDF Istio Gateway - Prestaging Environment Configuration
# This configures your own Istio control plane in CRC environment

# Gateway configuration for prestaging
gateway:
  enabled: true
  name: omnipdf-gateway
  selector:
    istio: ingressgateway
  
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "omnipdf-prestaging.apps-crc.testing"
      # No HTTPS redirect in prestaging for easier testing
    - port:
        number: 443
        name: https  
        protocol: HTTPS
      hosts:
        - "omnipdf-prestaging.apps-crc.testing"
      tls:
        mode: SIMPLE
        # Use CRC default certificates for prestaging
        credentialName: omnipdf-prestaging-tls

# VirtualService for prestaging routing
virtualService:
  enabled: true
  name: omnipdf-prestaging-routes
  hosts:
    - "omnipdf-prestaging.apps-crc.testing"
  gateways:
    - omnipdf-gateway
  
  routes:
    # Frontend UI (highest priority)
    - match:
        - uri:
            exact: "/"
        - uri:
            prefix: "/static/"
        - uri:
            prefix: "/_stcore/"  # Streamlit core assets
      route:
        - destination:
            host: frontend.omnipdf-prestaging.svc.cluster.local
            port:
              number: 8501
      priority: 5
    
    # API routes
    - match:
        - uri:
            prefix: "/api/"
      rewrite:
        uri: "/"
      route:
        - destination:
            host: pdf-processor-service.omnipdf-prestaging.svc.cluster.local
            port:
              number: 8000
      priority: 10
    
    # Legacy routes
    - match:
        - uri:
            prefix: "/pdf_processor/"
      rewrite:
        uri: "/"  
      route:
        - destination:
            host: pdf-processor-service.omnipdf-prestaging.svc.cluster.local
            port:
              number: 8000
      priority: 10

# mTLS for internal service communication
destinationRules:
  enabled: true
  services:
    - name: frontend.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: pdf-processor-service.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: chat-service.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: embedder-service.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: chromadb.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: redis.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: minio.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: pdf-extraction-service.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: docling-translation-service.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: pdf-renderer-service.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: image-captioner-service.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: metadata-service.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: cleaner.omnipdf-prestaging.svc.cluster.local
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL

# External services for prestaging vLLM
serviceEntries:
  enabled: true
  entries:
    - name: prestaging-vllm-text
      hosts:
        - "webworkdgx"  # Your external vLLM host
      ports:
        - number: 8080
          name: vllm-qwen3coder
          protocol: HTTP
        - number: 8000  
          name: vllm-alt
          protocol: HTTP
      location: MESH_EXTERNAL
      resolution: DNS

# Enable sidecar injection for prestaging namespace
sidecarInjection:
  enabled: true
  namespaceLabels:
    istio-injection: enabled
  podAnnotations:
    sidecar.istio.io/inject: "true"

# Prestaging environment settings
environment: prestaging

# Reduced resource requirements for CRC
resources:
  requests:
    cpu: 50m
    memory: 64Mi  
  limits:
    cpu: 200m
    memory: 256Mi

# Network policy enabled for ingress gateway
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    allowedCallers:
      # Nginx - API/UI requests → Istio Gateway
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: nginx
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: false
    allowHTTP: false
    allowedTargets:
      # Frontend - routes UI requests
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: frontend
        ports: [8501]
      # PDF Processor Service - routes API requests
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-processor-service
        ports: [8000]

# Default service configuration
service:
  type: ClusterIP
  ports:
    - port: 80
      name: http
    - port: 443
      name: https

# Default serviceAccount configuration  
serviceAccount:
  create: false
  automount: false

# Default ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []