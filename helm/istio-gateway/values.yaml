# OmniPDF Istio Gateway Configuration
# For prestaging environment with own Istio control plane

# Gateway configuration
gateway:
  enabled: true
  name: omnipdf-gateway
  namespace: istio-system
  selector:
    istio: ingressgateway
  
  # Ports configuration
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "omnipdf.prestaging.local"
        - "omnipdf-prestaging.apps-crc.testing"
      # HTTP to HTTPS redirect
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "omnipdf.prestaging.local"
        - "omnipdf-prestaging.apps-crc.testing"
      tls:
        mode: SIMPLE
        # Certificate will be mounted by platform/cert-manager
        credentialName: omnipdf-tls-secret

# VirtualService configuration for OmniPDF routing
virtualService:
  enabled: true
  name: omnipdf-routes
  hosts:
    - "omnipdf.prestaging.local"
    - "omnipdf-prestaging.apps-crc.testing"
  gateways:
    - omnipdf-gateway
  
  # Route configuration matching nginx.conf.template
  routes:
    # Frontend UI routes (/)
    - match:
        - uri:
            prefix: "/"
      route:
        - destination:
            host: frontend-service
            port:
              number: 8501
      # Ensure UI routes have priority
      priority: 10
    
    # API routes (/api/)
    - match:
        - uri:
            prefix: "/api/"
      rewrite:
        uri: "/"
      route:
        - destination:
            host: pdf-processor-service
            port:
              number: 8000
      priority: 20
    
    # Legacy PDF processor routes (/pdf_processor/)  
    - match:
        - uri:
            prefix: "/pdf_processor/"
      rewrite:
        uri: "/"
      route:
        - destination:
            host: pdf-processor-service
            port:
              number: 8000
      priority: 20

# Service-to-service mTLS configuration
destinationRules:
  enabled: true
  # Enable mTLS for all OmniPDF services within mesh
  defaultTrafficPolicy:
    tls:
      mode: ISTIO_MUTUAL  # Automatic mTLS within service mesh
  
  services:
    - name: frontend-service
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: pdf-processor-service
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: chat-service
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: embedder-service
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: chromadb-service
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: redis-service
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL
    - name: minio-service
      trafficPolicy:
        tls:
          mode: ISTIO_MUTUAL

# External service entries for vLLM endpoints
serviceEntries:
  enabled: true
  entries:
    - name: external-vllm-text
      hosts:
        - "webworkdgx"  # Your external vLLM host
      ports:
        - number: 8080
          name: http
          protocol: HTTP
        - number: 8000
          name: http-alt
          protocol: HTTP
      location: MESH_EXTERNAL
      resolution: DNS
    
    - name: external-vllm-vlm
      hosts:
        - "webworkdgx"  # Your external VLM host  
      ports:
        - number: 8081
          name: http-vlm
          protocol: HTTP
      location: MESH_EXTERNAL  
      resolution: DNS

# Sidecar injection configuration
sidecarInjection:
  enabled: true
  # Namespace label for automatic sidecar injection
  namespaceLabels:
    istio-injection: enabled
  
  # Pod annotations for services that need sidecar
  podAnnotations:
    sidecar.istio.io/inject: "true"

# Environment-specific overrides
environment: prestaging

# Resource limits for Istio components (prestaging-appropriate)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi