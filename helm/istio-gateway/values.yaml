# OmniPDF Istio Gateway - Default Configuration
# This provides sensible defaults for the Istio gateway configuration

# Gateway configuration
gateway:
  enabled: true
  name: omnipdf-gateway
  selector:
    istio: ingressgateway
  
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
    - port:
        number: 443
        name: https  
        protocol: HTTPS
      hosts:
        - "*"
      tls:
        mode: SIMPLE

# VirtualService configuration
virtualService:
  enabled: true
  name: omnipdf-routes
  hosts:
    - "*"
  gateways:
    - omnipdf-gateway
  
  routes:
    # Frontend UI (highest priority)
    - match:
        - uri:
            exact: "/"
        - uri:
            prefix: "/static/"
        - uri:
            prefix: "/_stcore/"
      route:
        - destination:
            host: frontend.default.svc.cluster.local
            port:
              number: 8501
      priority: 5
    
    # API routes
    - match:
        - uri:
            prefix: "/api/"
      rewrite:
        uri: "/"
      route:
        - destination:
            host: pdf-processor-service.default.svc.cluster.local
            port:
              number: 8000
      priority: 10

# Destination Rules for mTLS
destinationRules:
  enabled: false
  services: []

# External service entries
serviceEntries:
  enabled: false
  entries: []

# Sidecar injection configuration
sidecarInjection:
  enabled: false
  namespaceLabels: {}
  podAnnotations: {}

# Environment setting
environment: default

# Resource configuration
resources:
  requests:
    cpu: 100m
    memory: 128Mi  
  limits:
    cpu: 500m
    memory: 512Mi

# Network policy configuration
networkPolicy:
  enabled: false
  ingress:
    enabled: false
    allowedCallers: []
  egress:
    enabled: false
    allowDNS: false
    allowHTTPS: false
    allowHTTP: false
    allowedTargets: []