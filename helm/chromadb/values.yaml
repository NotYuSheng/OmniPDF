# Default values for chromadb.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: chromadb/chroma
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

#This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/ 
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  # runAsUser: 65534  # Let OpenShift assign user ID automatically
  readOnlyRootFilesystem: false  # ChromaDB needs to write to filesystem
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8000
  targetPort: 8000

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 512Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 12
  successThreshold: 1

livenessProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

#This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# This section is for configuring the ingress more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Persistence configuration for ChromaDB data storage
persistence:
  enabled: true
  # existingClaim: ""  # Use existing PVC instead of creating new one
  storageClass: ""     # Use default storage class
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  annotations: {}

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# ChromaDB specific configuration
chromadb:
  # Enable persistent storage
  persistent: "true"
  # Disable anonymous telemetry
  anonymizedTelemetry: "false"

# Additional environment variables
env: []
  # - name: "CHROMA_SERVER_HOST"
  #   value: "0.0.0.0"
  # - name: "CHROMA_SERVER_HTTP_PORT"
  #   value: "8000"

# Deployment strategy for updates (defaults to Kubernetes standard)
deploymentStrategy: {}
  # Example configurations:
  # type: RollingUpdate
  # rollingUpdate:
  #   maxUnavailable: 25%
  #   maxSurge: 25%
  # 
  # OR for faster dev updates:
  # type: Recreate

# Network policy configuration for network segmentation
networkPolicy:
  enabled: false  # Disabled by default for dev/testing
  ingress:
    enabled: true
    # Allow ingress controller to reach this service
    fromIngressController: true
    ingressControllerNamespaceLabels:
      name: ingress-nginx
    # Allow services in same namespace to communicate
    fromSameNamespace: true
    # Custom ingress rules (empty by default)
    customRules: []
  egress:
    enabled: true
    # Allow DNS resolution (required for hostname lookups)
    allowDNS: true
    # Allow HTTPS for external APIs
    allowHTTPS: true
    # Allow HTTP for internal services  
    allowHTTP: true
    # Allow communication to LLM service (not applicable for ChromaDB)
    allowLLMService: false
    llmServiceSelectors: []
    llmServicePorts: []
    # Allow traffic to same namespace
    toSameNamespace: true
    # Custom egress rules (empty by default)
    customRules: []

# Pod Disruption Budget for high availability during maintenance
podDisruptionBudget:
  enabled: false  # Disabled by default for dev
  # Use either minAvailable OR maxUnavailable (not both)
  minAvailable: null
  maxUnavailable: null

# Service monitoring for Prometheus (optional)
serviceMonitor:
  enabled: false  # Disabled by default - enable in environments with Prometheus
  # Metrics endpoint configuration
  port: "http"              # Service port name to scrape (default: http)
  path: "/api/v1/heartbeat" # ChromaDB heartbeat endpoint
  interval: "30s"           # How often to scrape metrics
  scrapeTimeout: "10s"      # Timeout for each scrape
  honorLabels: false        # Whether to honor labels from target
  # Additional labels for ServiceMonitor resource
  labels: {}
  # Additional annotations for ServiceMonitor resource  
  annotations: {}
  # Metric relabeling (advanced)
  metricRelabelings: []
  relabelings: []