# Production environment configuration for ChromaDB
# This file overrides default values.yaml for production deployment

# Single replica for production (ChromaDB doesn't support clustering)
replicaCount: 1
autoscaling:
  enabled: false

# Production resource allocation
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 2Gi

# Production persistence configuration
persistence:
  enabled: true
  storageClass: ""  # Use default storage class or specify production class
  size: 100Gi
  accessModes:
    - ReadWriteOnce

# Production health probes
startupProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 45
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 15
  successThreshold: 1

livenessProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 2
  successThreshold: 1

# ChromaDB configuration for production
chromadb:
  persistent: "true"
  anonymizedTelemetry: "false"

# Environment-specific environment variables
env:
  - name: "LOG_LEVEL"
    value: "WARN"
  - name: "ENVIRONMENT"
    value: "production"

# Production deployment strategy
deploymentStrategy:
  type: Recreate  # Use Recreate for single replica with persistent storage

# Production security context (more restrictive)
securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  readOnlyRootFilesystem: false  # ChromaDB needs to write to filesystem
  capabilities:
    drop:
      - ALL

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Node selection for production workloads (if using node pools)
nodeSelector: {}
  # environment: production
  # node-type: database

# Tolerations for dedicated production nodes
tolerations: []
  # - key: "production"
  #   operator: "Equal"
  #   value: "true"
  #   effect: "NoSchedule"

# No anti-affinity needed for single replica
affinity: {}

# Backup and maintenance annotations
podAnnotations:
  backup.omnipdf.local/enabled: "true"
  backup.omnipdf.local/schedule: "0 2 * * *"