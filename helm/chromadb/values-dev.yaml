# Development environment configuration for ChromaDB
# This file overrides default values.yaml for local development

# Single replica for development
replicaCount: 1
autoscaling:
  enabled: false

# Development resource allocation - minimal for local testing
resources:
  limits:
    cpu: 200m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi

# Development persistence - smaller size
persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessModes:
    - ReadWriteOnce

# Health probes with relaxed timing for development
startupProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

livenessProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 60
  periodSeconds: 60
  timeoutSeconds: 10
  failureThreshold: 5
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# ChromaDB configuration for development
chromadb:
  persistent: "true"
  anonymizedTelemetry: "false"

# Environment-specific environment variables
env:
  - name: "LOG_LEVEL"
    value: "DEBUG"
  - name: "ENVIRONMENT"
    value: "development"

# No specific requirements for development
nodeSelector: {}
tolerations: []
affinity: {}