apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "chromadb.fullname" . }}-test-connection"
  labels:
    {{- include "chromadb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['--spider', '--timeout=10', '{{ include "chromadb.fullname" . }}:{{ .Values.service.port }}/api/v1/heartbeat']
  restartPolicy: Never