# Prestaging environment configuration for ChromaDB
# This file overrides default values.yaml for prestaging deployment in CRC

# Single replica for prestaging
replicaCount: 1
autoscaling:
  enabled: false

# Prestaging resource allocation - conservative for CRC
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Persistence configuration for prestaging
persistence:
  enabled: true
  storageClass: ""  # Use default CRC storage class
  size: 2Gi
  accessModes:
    - ReadWriteOnce

# Health probes enabled for prestaging to mirror production behavior
startupProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 12
  successThreshold: 1

livenessProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /api/v1/heartbeat
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# ChromaDB configuration for prestaging
chromadb:
  persistent: "true"
  anonymizedTelemetry: "false"

# Environment-specific environment variables
env:
  - name: "LOG_LEVEL"
    value: "DEBUG"
  - name: "ENVIRONMENT" 
    value: "prestaging"

# OpenShift security context adjustments for CRC
securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  runAsNonRoot: true

# No node selection needed for CRC
nodeSelector: {}
tolerations: []
affinity: {}