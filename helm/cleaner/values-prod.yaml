# Production environment overrides

# Production image handling
image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/cleaner
  pullPolicy: Always

# Production resources
resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 150m
    memory: 256Mi

# Environment variables
env:
  - name: LOG_LEVEL
    value: "ERROR"
  - name: ENVIRONMENT
    value: "production"

# Production secrets
secrets:
  create: false
  name: cleaner-production-secrets

# Enable network policy for production security
networkPolicy:
  enabled: true

# Simple recreate strategy for background service
deploymentStrategy:
  type: Recreate