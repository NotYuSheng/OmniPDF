# Pre-staging environment overrides

# Production-like image handling
image:
  pullPolicy: Always

# Pre-staging resources (production-like)
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Environment variables
env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENVIRONMENT
    value: "prestaging"

# Pre-staging secrets
secrets:
  create: false
  name: cleaner-prestaging-secrets

# Enable network policy for pre-staging security validation
networkPolicy:
  enabled: true
  ingress:
    enabled: false  # Cleaner is a background worker, no incoming calls
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: false
    allowHTTP: false
    allowedTargets:
      # MinIO - delete expired files
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: minio
        ports: [9000]
      # ChromaDB - remove expired vectors
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: chromadb
        ports: [8000]
      # Redis - clean sessions
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: redis
        ports: [6379]

# Simple recreate strategy for background service (override shared prestaging values)
deploymentStrategy:
  type: Recreate
  # Explicitly clear rollingUpdate to avoid conflicts
  rollingUpdate: null

# Cleaner doesn't need multiple replicas or autoscaling
replicaCount: 1
autoscaling:
  enabled: false

# Disable PDB for single replica service  
podDisruptionBudget:
  enabled: false

# Enable metrics service for prestaging
service:
  enabled: true
  type: ClusterIP
  port: 8080

# Enable service monitoring for prestaging
serviceMonitor:
  enabled: true
  port: "metrics"
  path: "/metrics"
  interval: "30s"
  scrapeTimeout: "10s"
  labels:
    environment: prestaging
# Istio sidecar injection for service mesh
podAnnotations:
  sidecar.istio.io/inject: "true"
  sidecar.istio.io/proxyCPU: "10m"
  sidecar.istio.io/proxyMemory: "128Mi"

# Service configuration
service:
  enabled: false  # Background service - no HTTP endpoint
  type: ClusterIP
  port: 8000

serviceAccount:
  create: false
  automount: false

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
