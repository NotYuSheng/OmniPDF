# Staging environment overrides

# Production-like image handling
image:
  repository: ghcr.io/notyusheng/cleaner
  pullPolicy: Always

# Staging resources
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Environment variables
env:
  - name: LOG_LEVEL
    value: "WARN"
  - name: ENVIRONMENT
    value: "staging"

# Staging secrets
secrets:
  create: false
  name: cleaner-staging-secrets

# Enable network policy for staging security testing
networkPolicy:
  enabled: true

# Simple recreate strategy for background service
deploymentStrategy:
  type: Recreate