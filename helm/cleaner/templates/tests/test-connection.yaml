apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cleaner.fullname" . }}-test-connection"
  labels:
    {{- include "cleaner.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: kubectl
      image: bitnami/kubectl:latest
      command: ['/bin/sh']
      args: 
        - -c
        - |
          echo "Testing cleaner deployment status..."
          kubectl get deployment {{ include "cleaner.fullname" . }} -n {{ .Release.Namespace }}
          kubectl wait --for=condition=available --timeout=60s deployment/{{ include "cleaner.fullname" . }} -n {{ .Release.Namespace }}
          echo "Cleaner deployment is running successfully"
  restartPolicy: Never
  serviceAccountName: {{ include "cleaner.serviceAccountName" . }}
