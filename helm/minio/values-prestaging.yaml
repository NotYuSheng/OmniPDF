# MinIO prestaging environment configuration

# Single replica for prestaging
replicaCount: 1

# Use official MinIO image
image:
  repository: minio/minio
  tag: "RELEASE.2025-07-23T15-54-02Z"
  pullPolicy: Always

# Prestaging bucket initialization
bucketInit:
  enabled: true
  image:
    repository: minio/mc
    tag: "RELEASE.2025-07-21T05-28-08Z"
    pullPolicy: Always

# Reduced resources for prestaging
resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Storage configuration for prestaging
persistence:
  enabled: true
  storageClass: ""  # Use default CRC storage
  accessModes:
    - ReadWriteOnce
  size: 5Gi  # Smaller size for prestaging

# MinIO credentials for prestaging (externally managed)
secrets:
  create: false
  name: minio-prestaging-secrets

# Environment-specific settings
env:
  - name: MINIO_BROWSER_REDIRECT_URL
    value: "http://localhost:9001"
  - name: MINIO_SERVER_URL
    value: "http://localhost:9000"
  - name: MINIO_CONSOLE_ADDRESS
    value: ":9001"

# Disable autoscaling for prestaging
autoscaling:
  enabled: false

# Use Recreate strategy for single-node
deploymentStrategy:
  type: Recreate

# Enable service monitoring if Prometheus is available
serviceMonitor:
  enabled: false  # Enable when monitoring stack is deployed
  interval: "60s"
  labels:
    environment: prestaging

# Network policy disabled for pre-staging flexibility
networkPolicy:
  enabled: false

# Istio sidecar injection for service mesh
podAnnotations:
  sidecar.istio.io/inject: "true"
  sidecar.istio.io/proxyCPU: "10m"
  sidecar.istio.io/proxyMemory: "128Mi"
