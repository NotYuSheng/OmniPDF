# MinIO production environment configuration

# Single replica (can be scaled to distributed mode)
replicaCount: 1

# Use official MinIO image with specific stable version
image:
  repository: minio/minio
  tag: "RELEASE.2025-07-23T15-54-02Z"
  pullPolicy: Always

# Production bucket initialization
bucketInit:
  enabled: true
  image:
    repository: minio/mc
    tag: "RELEASE.2025-07-21T05-28-08Z"
    pullPolicy: Always

# Production resources
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi

# Production storage configuration
persistence:
  enabled: true
  storageClass: "fast-ssd"
  accessModes:
    - ReadWriteOnce
  size: 100Gi  # Large storage for production

# MinIO credentials for production (use external secret manager)
secrets:
  create: false  # Use external secret in production
  name: minio-prod-secrets

# Production environment settings
env:
  - name: MINIO_BROWSER_REDIRECT_URL
    value: "https://minio-console.omnipdf.com"
  - name: MINIO_SERVER_URL
    value: "https://minio.omnipdf.com"
  - name: MINIO_CONSOLE_ADDRESS
    value: ":9001"
  - name: MINIO_PROMETHEUS_AUTH_TYPE
    value: "public"

# Enable production ingress
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
  hosts:
    - host: minio.omnipdf.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: minio-prod-tls
      hosts:
        - minio.omnipdf.com

consoleIngress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: minio-console.omnipdf.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: minio-console-prod-tls
      hosts:
        - minio-console.omnipdf.com

# Autoscaling disabled for single-node (enable for distributed mode)
autoscaling:
  enabled: false

# Enable high availability features
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Production monitoring
serviceMonitor:
  enabled: true
  interval: "15s"
  labels:
    environment: production

# Enable network policies for security
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    # ZERO-TRUST: Only specific services can access MinIO
    allowedCallers:
      # PDF processor stores/retrieves files and manages jobs
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-processor-service
      # PDF extraction stores extracted images and JSON
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-extraction-service
      # Metadata service stores/loads job results
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: metadata-service
      # Cleaner removes expired files
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: cleaner
    # Custom ingress rules for special cases
    customRules: []
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: false  # MinIO is object storage, doesn't call external APIs

# Production resource quotas
