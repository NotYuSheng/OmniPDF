# Production environment configuration for frontend
# This file overrides default values.yaml for production deployment

# Multiple replicas for production high availability
replicaCount: 3

# Use production image configuration
image:
  repository: ghcr.io/notyusheng/frontend
  tag: "dev-v0.0.3-5d69f89"
  pullPolicy: Always

# Production resource allocation - generous for web UI
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Production autoscaling
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60  # Conservative for prod
  targetMemoryUtilizationPercentage: 70

# Production ingress with proper SSL
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "production-issuer"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: frontend.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-prod-tls
      hosts:
        - frontend.company.com

# Production secrets (externally managed)
secrets:
  create: false
  name: frontend-prod-secrets

# Production pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

# Production node affinity (spread across zones)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - frontend
        topologyKey: kubernetes.io/hostname

# Environment variables for production
env:
  - name: LOG_LEVEL
    value: "ERROR"
  - name: ENVIRONMENT
    value: "production"
  - name: STREAMLIT_CLIENT_TOOLBAR_MODE
    value: "minimal"
  - name: STREAMLIT_CLIENT_SHOW_ERROR_DETAILS
    value: "false"
  - name: STREAMLIT_CLIENT_DISPLAY_PRIMARY_COLOR
    value: "#1f77b4"
  - name: PERFORMANCE_MODE
    value: "high"

# Health probes optimized for production
startupProbe:
  enabled: true
  httpGet:
    path: /_stcore/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 15
  successThreshold: 1

livenessProbe:
  enabled: true
  httpGet:
    path: /_stcore/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  httpGet:
    path: /_stcore/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 2
  successThreshold: 1

# Enable monitoring for production
serviceMonitor:
  enabled: true
  interval: "30s"           # Standard production monitoring interval
  scrapeTimeout: "10s"      # Conservative timeout
  labels:
    environment: production # Help Prometheus organize metrics

# Enable network policy for production security
networkPolicy:
  enabled: true

# Pod disruption budget for production high availability
podDisruptionBudget:
  enabled: true
  maxUnavailable: "33%"  # Allow 33% disruption, keep 67% running

# Ultra-conservative deployment strategy for production
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: "10%"  # Very conservative - only 10% down at a time
    maxSurge: "25%"        # Allow 25% extra pods for smooth rollout

# Production tolerations for critical workload scheduling
tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"