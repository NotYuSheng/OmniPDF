# Default values for image-captioner-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/image_captioner_service
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # Let OpenShift assign appropriate user/group IDs automatically
  # fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  # runAsUser: 65534  # Let OpenShift assign user ID automatically
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault  # Required for OpenShift restricted security
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2

#This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: true  # ENABLED: Lightweight HTTP client can handle concurrent VLM requests
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Vision Language Model Configuration
vlm:
  baseUrl: "http://192.168.137.103:1234/v1"  # Default for local dev
  model: "Qwen2.5-VL-7B-Instruct"
  temperature: "0.1"
  maxTokens: "2000"
  topP: "0.8"
  freqPenalty: "0.1"
  presencePenalty: "0.1"
  maxContext: "4000"
  enablePostProcessing: "true"

env: []  # Will be populated from VLM config in deployment template

# Secret configuration for sensitive values
secrets:
  # Must reference existing secret - secret templates removed for security
  create: true
  # Name of the secret to reference (must exist)
  name: image-captioner-service-secrets

serviceMonitor:
  enabled: false  # Disabled by default - enable in environments with Prometheus
  # Metrics endpoint configuration
  port: "http"              # Service port name to scrape (default: http)
  path: "/metrics"          # Metrics endpoint path
  interval: "30s"           # How often to scrape metrics
  scrapeTimeout: "10s"      # Timeout for each scrape
  honorLabels: false        # Whether to honor labels from target
  # Additional labels for ServiceMonitor resource
  labels: {}
  # Additional annotations for ServiceMonitor resource  
  annotations: {}
  # Metric relabeling (advanced)
  metricRelabelings: []
  relabelings: []

# Network policy configuration for zero-trust network segmentation
networkPolicy:
  enabled: false  # Disabled by default for dev/testing
  ingress:
    enabled: true
    # ZERO-TRUST: Only pdf-extraction-service can call image-captioner-service
    allowedCallers:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-extraction-service
    # Custom ingress rules for special cases
    customRules: []
  egress:
    enabled: true
    # Essential egress for all services
    allowDNS: true
    allowHTTPS: true  # For external vLLM in prestaging
    # ZERO-TRUST: image-captioner-service can only call specific services
    allowedTargets: []  # Configured via customRules for external vLLM VLM
    # Custom egress rules for special cases (external vLLM VLM, etc.)
    customRules: []

# Pod Disruption Budget for high availability during maintenance
podDisruptionBudget:
  enabled: false  # Disabled by default for dev
  # Use either minAvailable OR maxUnavailable (not both)
  minAvailable: null
  maxUnavailable: null
