# Pre-staging environment overrides - minimal for disk pressure
replicaCount: 1

# Pre-staging VLM configuration - External VLM service on VPN
vlm:
  baseUrl: "http://100.108.2.57/vlm_qwen2.5/v1"
  model: "Qwen2.5-VL-14B-Instruct"  # Model name as served by external VLM

# Pre-staging resources - minimal for disk pressure
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Disable autoscaling for prestaging due to disk pressure
autoscaling:
  enabled: false

# Pre-staging secrets
secrets:
  create: false
  name: image-captioner-service-prestaging-secrets

# Pre-staging specific configurations - using local CRC registry
image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/image_captioner_service
  tag: "dev-v0.0.3-5d69f89"
  pullPolicy: Always  # Use local registry image

# Environment variables
env:
  - name: LOG_LEVEL
    value: "INFO"
  - name: ENVIRONMENT
    value: "prestaging"
  - name: ENABLE_METRICS
    value: "true"

# Network policy disabled for pre-staging flexibility
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    allowedCallers:
      # PDF Extraction Service - requests image captioning
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: pdf-extraction-service
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: true  # External VLM API calls
    allowHTTP: true   # External VLM API calls
    allowedTargets: []  # Only external VLM calls, no internal services

# Pod disruption budget for pre-staging (2 replicas, allow 1 down)
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Moderate deployment strategy for pre-staging (balanced speed/safety)
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    minAvailable: 1
    maxSurge: 1

# Moderate resource quota for pre-staging testing
serviceMonitor:
  enabled: true
  interval: "20s"           # Between staging and prod intervals
  scrapeTimeout: "8s"       # Slightly shorter timeout for testing
  labels:
    environment: prestaging # Help identify prestaging metrics

# Add toleration for disk pressure to allow scheduling
tolerations:
  - key: "node.kubernetes.io/disk-pressure"
    operator: "Exists"
    effect: "NoSchedule"
# Istio sidecar injection for service mesh
podAnnotations:
  sidecar.istio.io/inject: "true"
  sidecar.istio.io/proxyCPU: "10m"
  sidecar.istio.io/proxyMemory: "128Mi"
