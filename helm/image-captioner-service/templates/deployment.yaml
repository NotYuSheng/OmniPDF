apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "image-captioner-service.fullname" . }}
  labels:
    {{- include "image-captioner-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- with .Values.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "image-captioner-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "image-captioner-service.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "image-captioner-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            # VLM Configuration
            - name: OPENAI_BASE_URL
              value: {{ .Values.vlm.baseUrl | quote }}
            - name: OPENAI_VLM
              value: {{ .Values.vlm.model | quote }}
            - name: MODEL_TEMPERATURE
              value: {{ .Values.vlm.temperature | quote }}
            - name: MODEL_MAX_TOKENS
              value: {{ .Values.vlm.maxTokens | quote }}
            - name: MODEL_TOP_P
              value: {{ .Values.vlm.topP | quote }}
            - name: MODEL_FREQ_PENALTY
              value: {{ .Values.vlm.freqPenalty | quote }}
            - name: MODEL_PRESENCE_PENALTY
              value: {{ .Values.vlm.presencePenalty | quote }}
            - name: MODEL_MAX_CONTEXT
              value: {{ .Values.vlm.maxContext | quote }}
            - name: ENABLE_RESPONSE_POST_PROCESSING
              value: {{ .Values.vlm.enablePostProcessing | quote }}
            # Additional environment variables
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            # Secret environment variables
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "image-captioner-service.secretName" . }}
                  key: OPENAI_API_KEY
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}