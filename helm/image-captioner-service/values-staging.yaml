# Staging environment overrides
replicaCount: 2

# Staging VLM configuration
vlm:
  baseUrl: "http://vlm-staging.internal.company.com/v1"
  model: "Qwen2.5-VL-7B-Instruct"  # Production-like model

# Staging resources (closer to production)
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

# Production-like autoscaling (disabled for VLM service)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Staging secrets
secrets:
  create: false
  name: image-captioner-service-staging-secrets

# Production-like image handling - using local CRC registry
image:
  repository: default-route-openshift-image-registry.apps-crc.testing/omnipdf/image_captioner_service
  tag: "dev-v0.0.1-860e67e"
  pullPolicy: Always

# Enable ingress for staging testing
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "staging-issuer"
  hosts:
    - host: image-captioner-staging.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: image-captioner-staging-tls
      hosts:
        - image-captioner-staging.company.com

# Environment variables
env:
  - name: LOG_LEVEL
    value: "WARN"
  - name: ENVIRONMENT
    value: "staging"
  - name: ENABLE_METRICS
    value: "true"
  - name: ENABLE_TRACING
    value: "true"

# Enable network policy for staging security testing
networkPolicy:
  enabled: true

# Pod disruption budget for staging availability (2 replicas, allow 1 down)
podDisruptionBudget:
  enabled: false  # Disabled for single-replica VLM service

# Conservative deployment strategy for staging (production-like)
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

# Production-like resource quota for staging stress testing
serviceMonitor:
  enabled: true
  interval: "15s"  # More frequent monitoring for staging testing