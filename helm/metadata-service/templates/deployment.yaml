apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metadata-service.fullname" . }}
  labels:
    {{- include "metadata-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- with .Values.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "metadata-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "metadata-service.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "metadata-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            # LLM Configuration
            - name: OPENAI_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            - name: OPENAI_MODEL
              value: {{ .Values.llm.model | quote }}
            - name: MODEL_TEMPERATURE
              value: {{ .Values.llm.temperature | quote }}
            - name: MODEL_MAX_TOKENS
              value: {{ .Values.llm.maxTokens | quote }}
            - name: MODEL_TOP_P
              value: {{ .Values.llm.topP | quote }}
            - name: MODEL_FREQ_PENALTY
              value: {{ .Values.llm.freqPenalty | quote }}
            - name: MODEL_PRESENCE_PENALTY
              value: {{ .Values.llm.presencePenalty | quote }}
            # Metadata Configuration
            - name: SUMMARY_LENGTH
              value: {{ .Values.metadata.summaryLength | quote }}
            - name: SHORT_DSECRIPTION_LENGTH
              value: {{ .Values.metadata.shortDescriptionLength | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.metadata.batchSize | quote }}
            - name: WORDCLOUD_MAX_WORDS
              value: {{ .Values.metadata.wordcloudMaxWords | quote }}
            # Storage Configuration
            - name: MINIO_ENDPOINT
              value: {{ .Values.storage.endpoint | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.storage.bucket | quote }}
            # Redis Configuration
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            # Additional environment variables
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            # Secret environment variables
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "metadata-service.secretName" . }}
                  key: OPENAI_API_KEY
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "metadata-service.secretName" . }}
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "metadata-service.secretName" . }}
                  key: MINIO_SECRET_KEY
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}