name: Unit Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Free up additional space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
          sudo apt-get autoremove -y
          sudo apt-get autoclean
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Copy example.env to .env files
        run: |
          echo "Setting up environment files..."
          find . -name "example.env" | while read f; do
            cp "$f" "$(dirname "$f")/.env"
            echo "✓ Created $(dirname "$f")/.env"
          done

      - name: Make test scripts executable
        run: |
          chmod +x scripts/test-all-services.sh
          chmod +x scripts/test-single-service.sh

      - name: Run unit tests for all services
        run: |
          echo "🧪 Running OmniPDF Unit Test Suite"
          echo "=================================="
          ./scripts/test-all-services.sh

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: unit-test-logs
          path: /tmp/*_test.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose down || true
          docker system prune -f || true
          
          echo "=== Final disk usage ==="
          df -h